<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Scripting - Soporte Técnico</title>
    <meta name="description" content="Guía técnica de scripting para soporte de primera línea.">
    <!-- Google Fonts: Inter e Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <script>
        (function () {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div id="app">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo" id="logo-home">
                    <span class="logo-icon">⚡</span>
                    <h1>Apex<span>Scripting</span></h1>
                </div>
            </div>
            <nav class="categories">
                <button class="cat-btn active" data-category="all">Todos los Scripts</button>

                <div class="category-group">
                    <button class="cat-btn has-sub" data-category="Conectividad">
                        Conectividad
                    </button>
                    <div class="sub-nav" id="conectividad-sub">
                        <button class="cat-btn sub" data-category="Dinámico">Dinámico</button>
                        <button class="cat-btn sub" data-category="Simétrico">Simétrico</button>
                        <button class="cat-btn sub" data-category="xDSL">xDSL</button>
                        <button class="cat-btn sub" data-category="FTTH">FTTH</button>
                        <button class="cat-btn sub" data-category="GPON Corporativo">GPON Corporativo</button>
                        <button class="cat-btn sub" data-category="Internet Plus">Internet Plus</button>
                        <button class="cat-btn sub" data-category="Enlace Fibra">Enlace Fibra</button>
                        <button class="cat-btn sub" data-category="Satelital">Satelital</button>
                        <button class="cat-btn sub" data-category="VPN">VPN</button>
                        <button class="cat-btn sub" data-category="SD-Wan">SD-Wan</button>
                        <button class="cat-btn sub" data-category="SD-Branch">SD-Branch</button>
                        <button class="cat-btn sub" data-category="VVIP">VVIP</button>
                        <button class="cat-btn sub" data-category="Fibertel Zone">Fibertel Zone</button>
                        <button class="cat-btn sub" data-category="Servicios Adicionales">Servicios Adicionales</button>
                        <button class="cat-btn sub" data-category="LTE">LTE</button>
                    </div>
                </div>

                <button class="cat-btn" data-category="Video y Media">Video y Media</button>
                <button class="cat-btn" data-category="Voz Fija">Voz Fija</button>
                <button class="cat-btn" data-category="UCAAS & Colaboración">UCAAS & Colaboración</button>
                <button class="cat-btn" data-category="Cloud">Cloud</button>
                <button class="cat-btn" data-category="Data Center">Data Center</button>
                <button class="cat-btn" data-category="Seguridad">Seguridad</button>
                <button class="cat-btn" data-category="Innovación">Innovación</button>
                <button class="cat-btn" data-category="Móvil">Móvil</button>
                <button class="cat-btn" data-category="Servicios Especiales">Servicios Especiales</button>
                <button class="cat-btn" data-category="Contingencia ICD">Contingencia ICD</button>
                <button class="cat-btn" data-category="SPAM-WHITELIST">SPAM-WHITELIST</button>
            </nav>
            <div class="sidebar-footer">
                <a href="/history" class="history-link">
                    <i class="fas fa-history"></i> Historial
                </a>
                <p>v1.0.0 - <a href="https://github.com/gonzalogramagia" target="_blank"
                        style="color: inherit; text-decoration: none; opacity: 0.8;">Creado por Gonza</a></p>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-bar">
                <button class="hamburger-menu" id="hamburger-btn" aria-label="Menú">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Buscar procesos, pasos o códigos técnicos...">
                    <i class="fas fa-search search-icon"></i>
                    <div class="search-options">
                        <input type="checkbox" id="search-local">
                        <label for="search-local">En este script</label>
                    </div>
                </div>
                <div class="top-actions">
                    <a href="https://knowb2b.telecom.com.ar/getf.php?f=scripting_tecnico/html/menu_soporte.html"
                        target="_blank" class="action-btn scripting-btn" title="Ir al Scripting">
                        <i class="fas fa-file-alt"></i>
                    </a>
                </div>
            </header>

            <nav id="breadcrumbs" class="breadcrumbs"></nav>

            <section class="content-header">
                <h2 id="current-category">Todos los Scripts</h2>
                <div class="stats">
                    <span id="script-count">0</span> scripts encontrados
                </div>
            </section>

            <!-- Results Grid -->
            <div id="scripts-grid" class="scripts-grid">
                <!-- Script cards will be injected here by JS -->
                <div class="loader">Cargando scripts...</div>
            </div>
        </main>
    </div>

    <!-- Modal for script details -->
    <div id="script-modal" class="modal">
        <div class="modal-content">
            <button class="close-modal">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Image Lightbox -->
    <div id="image-lightbox" class="lightbox">
        <span class="close-lightbox">&times;</span>
        <img class="lightbox-content" id="img-zoomed">
    </div>

    <!-- Fixed Bottom Left Group -->
    <div class="fixed-bottom-left-group">
        <!-- 1 - Botón Simple (Hoy) -->
        <a href="https://apex.hoy.today/" class="floater-btn" aria-label="Hoy" title="Hoy">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-clipboard-clock">
                <rect width="8" height="4" x="8" y="2" rx="1" ry="1" />
                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" />
                <circle cx="12" cy="14" r="4" />
                <polyline points="12 12 12 14 14 15" />
            </svg>
        </a>
        <!-- 2 - Botón estándar (Habilitado) -->
        <a href="https://apex.milemojis.com" class="floater-btn" aria-label="Emojis" title="Emojis">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-smile">
                <circle cx="12" cy="12" r="10" />
                <path d="M8 14s1.5 2 4 2 4-2 4-2" />
                <line x1="9" x2="9.01" y1="9" y2="9" />
                <line x1="15" x2="15.01" y1="9" y2="9" />
            </svg>
        </a>
        <!-- 3 - Botón Expansible (Ej. Scripting) -->
        <div class="floater-btn expansible peer floater-disabled" aria-label="Scripting" title="Scripting">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-book-check">
                <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20" />
                <path d="m9 9.5 2 2 4-4" />
            </svg>
            <span class="expansible-text">Ir al Scripting</span>
        </div>
        <!-- 4 - Botón que se contrae (Ej. Antipala) -->
        <a href="https://apex.antipala.pro" class="floater-btn contractible peer-target" aria-label="Antipala"
            title="Antipala">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-shovel">
                <path d="M2 22v-5l5-5 5 5-5 5z" />
                <path d="M9.5 14.5 16 8" />
                <path d="m17 2 5 5-.5.5a3.53 3.53 0 0 1-5 0s0 0 0 0a3.53 3.53 0 0 1 0-5L17 2" />
            </svg>
        </a>
    </div>

    <!-- Fixed Bottom Right Button (Theme Toggle) -->
    <div class="fixed-bottom-right">
        <button id="theme-toggle-btn" class="floating-btn" aria-label="Cambiar Tema" title="Alternar Modo Oscuro/Claro"
            style="cursor: pointer;">
            <i class="fas fa-moon"></i>
        </button>
    </div>

    <script type="module" src="/main.js"></script>
</body>

</html>
