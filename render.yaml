services:
  - type: static
    name: apex-private
    buildCommand: npm run build
    publishPath: dist
    headers:
      - path: /index.html
        name: Cache-Control
        value: no-store, no-cache, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - source: /*
        destination: /index.html
        type: rewrite
